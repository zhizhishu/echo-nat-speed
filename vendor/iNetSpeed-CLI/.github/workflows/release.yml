name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"
          cache: true

      - name: Quality checks
        run: bash scripts/check.sh

  smoke:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"
          cache: true

      - name: Build and smoke
        shell: bash
        run: |
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "${tmpdir}"' EXIT
          binary="${tmpdir}/speedtest"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            binary="${binary}.exe"
          fi
          go build -o "${binary}" ./cmd/speedtest
          "${binary}" --help >/dev/null
          "${binary}" --version >/dev/null

  release:
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"
          cache: true

      - name: Build archives
        run: VERSION="${GITHUB_REF_NAME}" bash scripts/build.sh

      - name: Verify release artifacts
        run: |
          test -f dist/speedtest-darwin-amd64.tar.gz
          test -f dist/speedtest-darwin-arm64.tar.gz
          test -f dist/speedtest-linux-amd64.tar.gz
          test -f dist/speedtest-linux-arm64.tar.gz
          test -f dist/speedtest-windows-amd64.zip
          test -f dist/checksums-sha256.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums-sha256.txt
